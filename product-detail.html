<script>
document.addEventListener('DOMContentLoaded', () => {
  const id = new URLSearchParams(window.location.search).get('id');
  const rp = document.getElementById('related-products');
  if (rp) {
    rp.innerHTML = PRODUCTS.filter(p => p.id !== parseInt(id)).slice(0,4).map(p => `
      <div class="product-card" onclick="window.location.href='product-detail.html?id=${p.id}'">
        <div class="product-card-image">
          <img src="${p.image}" alt="${p.name}" onerror="this.parentElement.innerHTML='<div style=\'display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-size:0.75rem\'>${p.name}</div>'">
        </div>
        <div class="product-card-body">
          <div class="product-card-name">${p.name}</div>
          <div class="product-card-footer">
            <div class="product-price">Mulai dari<span>${new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR',minimumFractionDigits:0}).format(p.price)}</span></div>
            <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();addToCart(${p.id})">Pesan</button>
          </div>
        </div>
      </div>`).join('');
  }
});
</script>
