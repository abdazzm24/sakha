<!DOCTYPE html>

    <div class="sidebar-logo-img" style="display:none;justify-content:center;align-items:center;">SAKHAWEAR</div>
  </div>
  <nav class="sidebar-nav">
    <div class="sidebar-section-label">Menu Utama</div>
    <a href="index.html" class="sidebar-link"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a><a href="products.html" class="sidebar-link active"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>Produk</a><a href="articles.html" class="sidebar-link"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Artikel</a><a href="users.html" class="sidebar-link"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Pengguna</a><a href="transactions.html" class="sidebar-link"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>Transaksi</a><div class="sidebar-section-label" style="margin-top:8px">Pengaturan</div><a href="settings.html" class="sidebar-link"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/></svg>Pengaturan</a>

    <button class="sidebar-logout" onclick="logout()"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout</button>

<div class="dashboard-main">
<header class="dashboard-topbar">
  <div class="topbar-left">
    <button id="sidebar-toggle" style="display:none;width:36px;height:36px;align-items:center;justify-content:center;border:none;background:var(--light-gray);border-radius:var(--radius-md);cursor:pointer"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <div class="topbar-title">Form Produk</div>
  </div>
  <div class="topbar-right">
    <div class="topbar-search"><svg class="topbar-search-icon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" placeholder="Cari..."></div>
    <div class="topbar-icon-btn"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="notif-dot"></span></div>
    <a href="https://sienna-moments-669641.framer.app/" class="topbar-profile" target="_blank" rel="noopener noreferrer">
      <div class="topbar-avatar">A</div>
      <div><div class="topbar-profile-name admin-name">Admin</div><div class="topbar-profile-role">Administrator</div></div>
    </a>
  </div>
</header>
<div class="dashboard-content">
  <div class="dashboard-page-header">
    <div><div class="dashboard-page-title">Tambah / Edit Produk</div><div class="dashboard-page-subtitle">Isi data produk dengan lengkap</div></div>
    <a href="products.html" class="btn btn-outline btn-sm">← Kembali</a>
  </div>
  <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;align-items:start">
    <div class="form-card">
      <div class="form-section-title">Informasi Produk</div>
      <div class="form-group"><label class="form-label">Nama Produk *</label><input class="form-input" type="text" placeholder="Contoh: Seragam SD"></div>
      <div class="form-group"><label class="form-label">Kategori *</label><select class="form-input form-select"><option>Seragam Sekolah</option><option>Batik</option><option>Olahraga</option><option>Dinas</option></select></div>
      <div class="form-grid-2">
        <div class="form-group"><label class="form-label">Harga (Rp) *</label><input class="form-input" type="number" placeholder="85000"></div>
        <div class="form-group"><label class="form-label">Min. Order (pcs) *</label><input class="form-input" type="number" placeholder="12"></div>
      </div>
      <div class="form-group"><label class="form-label">Deskripsi Singkat *</label><textarea class="form-input form-textarea" placeholder="Deskripsi singkat produk..." style="min-height:80px"></textarea></div>
      <div class="form-group"><label class="form-label">Deskripsi Lengkap</label><textarea class="form-input form-textarea" placeholder="Deskripsi lengkap, bahan, keunggulan..."></textarea></div>
      <div class="form-grid-2">
        <div class="form-group"><label class="form-label">Material</label><input class="form-input" type="text" placeholder="Katun 100%"></div>
        <div class="form-group"><label class="form-label">Ukuran (pisahkan koma)</label><input class="form-input" type="text" placeholder="S, M, L, XL"></div>
      </div>
      <div class="form-group"><label class="form-label">Warna Tersedia</label><input class="form-input" type="text" placeholder="Putih, Biru, Merah"></div>
    </div>
    <div>
      <div class="form-card" style="margin-bottom:16px">
        <div class="form-section-title">Gambar Produk</div>
        <div style="border:2px dashed var(--border);border-radius:var(--radius-lg);padding:40px 20px;text-align:center;cursor:pointer;transition:border-color 0.2s" onmouseenter="this.style.borderColor='var(--primary)'" onmouseleave="this.style.borderColor='var(--border)'">
          <div style="font-size:32px;margin-bottom:8px">📷</div>
          <div style="font-size:0.875rem;font-weight:600;color:var(--text-primary);margin-bottom:4px">Upload Gambar</div>
          <div style="font-size:0.75rem;color:var(--text-muted)">PNG, JPG hingga 5MB</div>
          <div style="font-size:0.75rem;color:var(--text-muted);margin-top:4px">assets/images/products/nama-file.png</div>
        </div>
      </div>
      <div class="form-card">
        <div class="form-section-title">Pengaturan</div>
        <div class="form-group"><label class="form-label">Badge</label><input class="form-input" type="text" placeholder="Terlaris, Baru, Custom (opsional)"></div>
        <div class="form-group"><label class="form-label">Status</label><select class="form-input form-select"><option>Aktif</option><option>Nonaktif</option></select></div>
        <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="showToast('Produk berhasil disimpan!','success')">Simpan Produk</button>
        <button class="btn btn-outline" style="width:100%;justify-content:center;margin-top:8px" onclick="window.location.href='products.html'">Batal</button>
      </div>
    </div>
  </div>
</div></div>
