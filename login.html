<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin — SakhaWear</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/animation.css">
</head>
<body>
<div class="login-page">
  <div class="login-right login-right-full">
    <div class="login-form-box">
      <div class="login-form-logo">SAKHAWEAR</div>
      <h1 class="login-title">Selamat Datang</h1>
      <p class="login-subtitle">Masukkan nama dan password untuk mengakses dashboard admin.</p>

      <div id="login-error" style="display:none;background:rgba(232,1,55,0.08);border:1px solid rgba(232,1,55,0.2);color:var(--accent-pink);padding:12px 16px;border-radius:var(--radius-md);font-size:0.875rem;margin-bottom:20px"></div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label">Nama</label>
          <input type="text" id="login-name" class="form-input" placeholder="Masukkan nama Anda" autocomplete="name">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div style="position:relative">
            <input type="password" id="login-password" class="form-input" placeholder="Masukkan password" autocomplete="current-password" style="padding-right:44px">
            <button type="button" onclick="togglePass()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted)" id="pass-toggle">
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:8px" id="login-btn">
          Masuk ke Dashboard
        </button>
      </form>

      <div style="margin-top:24px;padding:14px;background:var(--light-gray);border-radius:var(--radius-md);font-size:0.8125rem;color:var(--text-muted);text-align:center">
        💡 <strong>Tip:</strong> Masukkan nama dan password apapun untuk masuk ke mode demo.
      </div>

      <div style="margin-top:24px;text-align:center">
        <a href="index.html" style="font-size:0.875rem;color:var(--text-muted)">← Kembali ke Website</a>
      </div>
    </div>
  </div>
</div>

<script src="assets/js/login.js"></script>
<script>
function togglePass() {
  const inp = document.getElementById('login-password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
